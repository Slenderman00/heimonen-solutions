                nodeTextColor: '#f8f8f2',
                labelBoxBackground: '#44475a',
                labelBoxBorderColor: '#6272a4',

        });

<body>

    <div id="canvas-container">

    <div class="center">

                    </a>
                </div>
                <div class="navbar-item selected">

                </div>
            </div>
            <div class="card-content">
                <img src="https://avatars.githubusercontent.com/u/24755365?v=4" alt="" class="round-image inline">
                <div class="inline infobox">
                    <p>
                    <h2>About me:</h2>
                    </p>
                    <p>
                        I'm a 24 year old developer from Oslo. I'm interested in programming, and electronics.
                    </p>
                    <p>
                    <h2>Socials:</h2>
                    <div class="social inline">
                        <a href="https://github.com/Slenderman00">
                            <h2>
                                <i class="fa fa-github" aria-hidden="true"></i>

                            </h2>
                        </a>
                    </div>
                    <div class="social inline">
                        <a href="https://matrix.to/#/@joar:matrix.joar.me">
                            <h2>

                    </p>
                </div>

            <div id="index-container">
            </div>
        </div>
    </div>
    <script>
        loadBackground();

        setTimeout(()=> {
            window.onscroll = function() {
                localStorage.setItem("scrollPosition", window.scrollY);
            }
        }, 1000)

        function scrollToSavedPosition() {
            const savedPosition = localStorage.getItem("scrollPosition");
            if (savedPosition) {
                window.scrollTo(0, savedPosition);
            }
        }


        if (window.location.hash) {
            var hash = window.location.hash.substring(1);
            addPreview(document.getElementById("index-container"), hash, () => {
                var elements = document.getElementsByClassName("index-item-title");

                elements[0].click();
                setTimeout(() => {
                    scrollToSavedPosition();
                }, 500)
            }, () => {
                MathJax.typesetPromise();
                hljs.highlightAll();
                window.mermaid.contentLoaded();
            });

            pollContentful(hash)
        }

        


    </script>
</body>

</html>
